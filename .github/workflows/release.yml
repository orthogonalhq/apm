name: Release

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="v$(grep '^version' cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does not exist, proceeding with release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        working-directory: cli
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          cd cli/target/${{ matrix.target }}/release
          tar czf ../../../../apm-${TAG}-${{ matrix.target }}.tar.gz apm
          cd ../../../..
          shasum -a 256 apm-${TAG}-${{ matrix.target }}.tar.gz > apm-${TAG}-${{ matrix.target }}.tar.gz.sha256

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          cd cli/target/${{ matrix.target }}/release
          7z a ../../../../apm-${TAG}-${{ matrix.target }}.zip apm.exe
          cd ../../../..
          sha256sum apm-${TAG}-${{ matrix.target }}.zip > apm-${TAG}-${{ matrix.target }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apm-${{ matrix.target }}
          path: |
            apm-${{ needs.version.outputs.tag }}-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag ${{ needs.version.outputs.tag }}
          git push origin ${{ needs.version.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*

  npm-publish:
    name: Publish npm packages
    needs: [version, build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare platform packages
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG="${{ needs.version.outputs.tag }}"

          declare -A TARGET_NPM=(
            ["x86_64-unknown-linux-gnu"]="linux-x64"
            ["aarch64-unknown-linux-gnu"]="linux-arm64"
            ["x86_64-unknown-linux-musl"]="linux-x64-musl"
            ["x86_64-apple-darwin"]="darwin-x64"
            ["aarch64-apple-darwin"]="darwin-arm64"
            ["x86_64-pc-windows-msvc"]="win32-x64-msvc"
          )

          for target in "${!TARGET_NPM[@]}"; do
            pkg_dir="npm/${TARGET_NPM[$target]}"
            mkdir -p "$pkg_dir/bin"

            if [[ "$target" == *"windows"* ]]; then
              cd "artifacts/apm-${target}"
              7z x "apm-${TAG}-${target}.zip" -o"../../${pkg_dir}/bin/"
              cd ../..
            else
              tar xzf "artifacts/apm-${target}/apm-${TAG}-${target}.tar.gz" -C "$pkg_dir/bin/"
            fi

            chmod +x "$pkg_dir/bin/"* 2>/dev/null || true

            # Update version in package.json
            cd "$pkg_dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd ../..
          done

      - name: Publish platform packages
        shell: bash
        run: |
          for pkg_dir in npm/linux-x64 npm/linux-arm64 npm/linux-x64-musl npm/darwin-x64 npm/darwin-arm64 npm/win32-x64-msvc; do
            echo "Publishing $pkg_dir..."
            cd "$pkg_dir"
            npm publish --access public
            cd ../..
          done

      - name: Publish main wrapper package
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cd npm/apm-cli

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '${VERSION}';
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          npm publish --access public

  homebrew:
    name: Update Homebrew formula
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate Homebrew formula
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG="${{ needs.version.outputs.tag }}"
          REPO="orthogonalhq/apm"

          SHA_DARWIN_ARM64=$(cat artifacts/apm-${TAG}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          SHA_DARWIN_X64=$(cat artifacts/apm-${TAG}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          SHA_LINUX_X64=$(cat artifacts/apm-${TAG}-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')
          SHA_LINUX_ARM64=$(cat artifacts/apm-${TAG}-aarch64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')

          cat > formula.rb << FORMULA
          class Apm < Formula
            desc "Agent Package Manager — a package manager for agent skills"
            homepage "https://apm.orthg.nl"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/apm-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/apm-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/apm-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/apm-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "apm"
            end

            test do
              assert_match "apm", shell_output("#{bin}/apm --version")
            end
          end
          FORMULA

      - name: Push to Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/orthogonalhq/homebrew-apm.git tap
          cp formula.rb tap/Formula/apm.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/apm.rb
          git commit -m "Update apm to ${{ needs.version.outputs.tag }}"
          git push
